services:
    api:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: parser_api
        command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
        ports:
            - "8000:8000"
        env_file:
            - .env
        depends_on:
            db:
                condition: service_healthy
        environment:
            DATABASE_URL: postgresql+asyncpg://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
    beat:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: parser_beat
        command: celery -A app.core.celery beat -l info
        env_file:
            - .env
        depends_on:
            rabbitmq:
                condition: service_started
            db:
                condition: service_healthy
    worker:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: parser_worker
        command: celery -A app.core.celery worker -l info
        env_file:
            - .env
        depends_on:
            rabbitmq:
                condition: service_started
            db:
                condition: service_healthy
    db:
        image: postgres:16.13-alpine
        container_name: parser_db
        environment:
            POSTGRES_USER: ${DB_USER}
            POSTGRES_PASSWORD: ${DB_PASSWORD}
            POSTGRES_DB: ${DB_NAME}
        env_file:
            - .env
        healthcheck:
            test: [ "CMD-SHELL", "pg_isready -U $${DB_USER} -d $${DB_NAME}" ]
            interval: 10s
            timeout: 5s
            retries: 5
        volumes:
            - db-data:/var/lib/postgresql/data
    rabbitmq:
        image: rabbitmq:4-management
        container_name: rabbitmq
        ports:
            - "5672:5672"
            - "15672:15672"
        environment:
            RABBITMQ_DEFAULT_USER: guest
            RABBITMQ_DEFAULT_PASS: guest
        volumes:
            - rabbitmq-data:/var/lib/rabbitmq/data

volumes:
    db-data:
    rabbitmq-data:
